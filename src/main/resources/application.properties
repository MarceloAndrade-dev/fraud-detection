# ===================================================================
# CONFIGURAÇÕES DA APLICAÇÃO
# ===================================================================
spring.application.name=fraud-detection
server.port=8080

# ===================================================================
# OPÇÃO A: CONFIGURAÇÃO DO BANCO DE DADOS (MYSQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/fraud_detector_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# ===================================================================
# CONFIGURAÇÕES DO HIBERNATE / JPA
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false